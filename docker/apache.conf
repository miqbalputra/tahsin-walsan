ServerName localhost

<Directory /var/www/html>
    AllowOverride All
    Options -Indexes
    Require all granted
</Directory>

<FilesMatch "^\.">
    Require all denied
</FilesMatch>

<FilesMatch "\.(sql|zip|xlsx|md)$">
    Require all denied
</FilesMatch>

<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml
</IfModule>

<IfModule mod_expires.c>
    ExpiresActive On
    ExpiresByType text/css "access plus 30 days"
    ExpiresByType application/javascript "access plus 30 days"
    ExpiresByType image/png "access plus 30 days"
    ExpiresByType image/svg+xml "access plus 30 days"
    ExpiresByType application/manifest+json "access plus 1 day"
</IfModule>

<FilesMatch "\.(css|js|png|svg|webp|ico)$">
    Header set Cache-Control "public, max-age=2592000"
</FilesMatch>

<FilesMatch "\.(php)$">
    Header set Cache-Control "no-store, no-cache, must-revalidate"
</FilesMatch>
